notes:
  execution_rules:
    - docs/status/roadmap-state.yaml is the single source of project status.
    - Execute exactly one smallest deliverable task per execution unit.
    - A task is complete only after implementation, tests, docs, review, commit, and push.
    - After each task, update this file with status, summary, tests, commit, and next task.
    - If a task is too large, split it and only do the first subtask.
    - If blocked, write blocked reason and suggested workaround, then switch to the next unblocked parity slice in the following unit.
    - Use docs/plans/2026-04-18-sourcebot-full-parity-roadmap.md as the governing full-parity roadmap until it is explicitly superseded.
