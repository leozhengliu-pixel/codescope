notes:
  execution_rules:
    - docs/status/roadmap-state.yaml is the single source of project status.
    - Execute exactly one smallest meaningful closure per execution unit.
    - A task is complete only after implementation, focused verification, docs/review as needed, commit, and push.
    - After each task, update this file with status, summary, tests, commit, and next task.
    - If a task is too large, split it toward a user-visible, operator-visible, or real implementation-backed closure rather than a paperwork-only fragment.
    - If blocked, write blocked reason and suggested workaround, then switch to the next unblocked parity slice in the following unit.
    - Use docs/plans/2026-04-22-sourcebot-follow-on-parity-roadmap.md as the governing full-parity roadmap until it is explicitly superseded.
  blockers:
    - id: follow-on-roadmap-bootstrap
      title: Prior per-task blockers archived by the follow-on roadmap bootstrap
      status: resolved
      evidence: >-
        The previous roadmap-specific blocker notes belonged to superseded pre-audit task
        splits. The governing roadmap is now
        `docs/plans/2026-04-22-sourcebot-follow-on-parity-roadmap.md`; Task 86 closed that
        bootstrap/operator workflow, Task 87a closed the durable PostgreSQL local-session
        slice, Task 87b1 closed the durable PostgreSQL bootstrap-admin slice, Task 87b2
        closed the durable PostgreSQL local-account/membership/invite slice, Task 87c1
        closed durable API-key/OAuth-client metadata, Task 87c2 closed bounded catalog
        reads, Task 87c3 closed PostgreSQL-backed repository-permission filtering for
        authenticated sync-job history, and the next live work item is Task 87c4 rather
        than any archived pre-follow-on blocker thread.
