version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: sourcebot-rewrite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sourcebot}
      POSTGRES_USER: ${POSTGRES_USER:-sourcebot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sourcebot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sourcebot} -d ${POSTGRES_DB:-sourcebot}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
